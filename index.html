<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="한글로 HTML 코드를 만들고 실행하고, 놀아보세요! 또 일반 HTML 코드를 실행하는 것도 가능합니다.">
<link rel="icon" href="/img/logo.png" type="image/png">
<title>한글HTML</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#1a2235,#2d3d5c);min-height:100vh;display:flex;align-items:center;justify-content:center;color:#fff;padding:20px;overflow:hidden}
.card{background:#fff;color:#1a1d23;border-radius:20px;padding:48px 44px;width:460px;max-width:94vw;box-shadow:0 32px 80px rgba(0,0,0,.4);text-align:center}
.logo{width:88px;height:88px;margin:0 auto 22px;border-radius:22px;overflow:hidden;background:#5b8def;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(91,141,239,.4)}
.logo img{width:100%;height:100%;object-fit:cover}
.logo .fallback{font-size:34px;font-weight:800;color:#fff}
h1{font-size:26px;margin-bottom:8px;letter-spacing:-.5px}
h1 span{color:#5b8def}
.desc{font-size:14px;color:#6b7280;line-height:1.7;margin-bottom:32px}
.feat{display:flex;gap:10px;justify-content:center;margin-bottom:34px;flex-wrap:wrap}
.chip{font-size:12px;background:#eef3ff;color:#3d6fd0;padding:6px 13px;border-radius:20px;font-weight:500}
.start-btn{display:inline-flex;align-items:center;gap:9px;background:#5b8def;color:#fff;border:none;border-radius:12px;padding:15px 40px;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;text-decoration:none;transition:all .18s;box-shadow:0 6px 18px rgba(91,141,239,.35)}
.start-btn:hover{background:#4a7ce0;transform:translateY(-2px);box-shadow:0 10px 26px rgba(91,141,239,.45)}
.note{margin-top:20px;font-size:11px;color:#9ca3af;display:flex;align-items:center;justify-content:center;gap:5px}
.foot{margin-top:6px;font-size:11px;color:#b6bcc9}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <img src="/img/logo.png" alt="로고" onerror="this.style.display='none';this.parentElement.innerHTML='<span class=fallback>한</span>'">
</div>
  <h1>한글<span>HTML</span></h1>
  <div class="desc">한글 태그로 HTML을 만드는 변환기입니다.<br>어려운 영어 태그 없이, 한글로 웹페이지를 작성해 보세요.</div>
  <div class="feat">
    <span class="chip">한글 → HTML</span>
    <span class="chip">실시간 미리보기</span>
    <span class="chip">역방향 변환</span>
  </div>
  <a class="start-btn" href="/bot-test">
    시작하기
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
  </a>
  <div class="note">
    <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    보안 확인 후 이동합니다
  </div>
  <div class="foot">© zzompaida</div>
</div>
</body>
</html>
