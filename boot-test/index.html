<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="logo.png" type="image/png">
<title>보안 확인 중...</title>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#1a2235,#2d3d5c);min-height:100vh;display:flex;align-items:center;justify-content:center;color:#fff;padding:20px}
.box{background:#fff;color:#1a1d23;border-radius:16px;padding:40px;width:420px;max-width:92vw;box-shadow:0 32px 80px rgba(0,0,0,.4);text-align:center}
.icon{width:60px;height:60px;margin:0 auto 18px;border-radius:16px;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#5b8def}
.icon img{width:100%;height:100%;object-fit:cover}
h1{font-size:20px;margin-bottom:6px}
.sub{font-size:13px;color:#6b7280;margin-bottom:26px;line-height:1.6}
.cf-wrap{display:flex;justify-content:center;margin-bottom:8px;min-height:65px}
.status{font-size:13px;color:#6b7280;margin-top:14px;min-height:20px}
.status.ok{color:#34c98a;font-weight:600}
.spinner{display:none;width:22px;height:22px;border:3px solid #e2e4e9;border-top-color:#4f8ef7;border-radius:50%;animation:spin .8s linear infinite;margin:8px auto 0}
@keyframes spin{to{transform:rotate(360deg)}}
.back{margin-top:18px;font-size:12px}
.back a{color:#9ca3af;text-decoration:none}.back a:hover{color:#5b8def}
.brand{margin-top:16px;font-size:12px;color:#9ca3af}.brand b{color:#4f8ef7}
</style>
</head>
<body>
<div class="box">
  <div class="icon"><img src="logo.png" alt="로고" onerror="this.parentElement.textContent='🔒'"></div>
  <h1>보안 확인</h1>
  <div class="sub">로봇이 아님을 확인합니다.<br>인증이 완료되면 자동으로 이동합니다.</div>
  <div class="cf-wrap">
    <div class="cf-turnstile" data-sitekey="0x4AAAAAADnt6Jka430H7PLo" data-theme="light" data-callback="onVerified"></div>
  </div>
  <div class="spinner" id="spinner"></div>
  <div class="status" id="status">인증을 완료해 주세요.</div>
  <div class="back"><a href="index.html">← 처음으로</a></div>
  <div class="brand">Protected by <b>Cloudflare</b></div>
</div>

<script>
// ★ 인증 통과 후 이동할 페이지
var REDIRECT_TO = 'han-html.html';

function onVerified(token){
  var s = document.getElementById('status');
  s.textContent = '✓ 인증 완료! 이동 중...';
  s.classList.add('ok');
  document.getElementById('spinner').style.display = 'block';
  setTimeout(function(){
    location.href = REDIRECT_TO;
  }, 800);
}
</script>
</body>
</html>
